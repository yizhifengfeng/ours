<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤ 网页 - 首页</title>
    <link rel="stylesheet" href="love.css">
</head>
<body>
    <!-- 首页整体容器：渐变背景、相对定位、可滚动 -->
    <main class="page-home">
        <!-- 主标题区："Ours" 大标题 + 圆形头像与爱心 -->
        <section class="hero" aria-label="主标题">
            <h1 class="hero-title">Ours</h1>
            <div class="hero-frames">
                <img class="hero-avatar" src="assets/avatar1.png" alt="" width="100" height="100">
                <span class="hero-heart" aria-hidden="true">❤</span>
                <img class="hero-avatar hero-avatar--right" src="assets/avatar2.png" alt="" width="100" height="100">
            </div>
        </section>

        <section class="home-photo-band" aria-label="首页中间照片">
            <div class="home-photo-card" id="homePhotoCard">
                <img class="home-photo-img" id="homePhotoImg" src="" alt="首页照片" hidden>
                <div class="home-photo-placeholder" id="homePhotoPlaceholder">
                    <span class="home-photo-placeholder-title">上传一张属于我们的照片</span>
                    <span class="home-photo-placeholder-text">点击这里更换首页中间大图</span>
                </div>
                <button type="button" class="home-photo-edit" id="homePhotoEdit">编辑图片</button>
                <input type="file" id="homePhotoUpload" class="home-photo-upload" accept="image/*" aria-label="上传首页中间图片">
            </div>
        </section>

        <!-- 底部功能卡片区：6 个入口卡片，居中、弹性换行 -->
        <nav class="card-row" aria-label="功能入口">
            <a href="where.html" class="card card--pink" aria-label="去哪儿">
                <img class="card-img" src="assets/card1.png" alt="" width="140" height="140">
                <span class="card-label">去哪儿</span>
            </a>
            <a href="xinjian.html" class="card card--mint" aria-label="信间">
                <img class="card-img" src="assets/card2.png" alt="" width="140" height="140">
                <span class="card-label">信间</span>
            </a>
            <a href="diandi.html" class="card card--pink" aria-label="点滴">
                <img class="card-img" src="assets/card3.png" alt="" width="140" height="140">
                <span class="card-label">点滴</span>
            </a>
            <a href="liuyan.html" class="card card--mint" aria-label="留言板">
                <img class="card-img" src="assets/card4.png" alt="" width="140" height="140">
                <span class="card-label">留言板</span>
            </a>
            <a href="first.html" class="card card--pink" aria-label="初时">
                <img class="card-img" src="assets/card5.png" alt="" width="140" height="140">
                <span class="card-label">初时</span>
            </a>
            <a href="keyword.html" class="card card--mint" aria-label="关键词">
                <img class="card-img" src="assets/card6.png" alt="" width="140" height="140">
                <span class="card-label">关键词</span>
            </a>
        </nav>
    </main>
    <script src="api-config.js"></script>
    <script src="index.js"></script>
    <script src="music-player.js"></script>
</body>
</html>
