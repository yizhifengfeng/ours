<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

<body>
    <!-- 照片详情页 -->
    <main class="page-photo-detail">
        <a href="place-detail.html" class="photo-detail-back">← 返回地点</a>
        <img class="photo-detail-img" id="photoImg" src="assets/place-hero.jpg" alt="照片" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22800%22 height=%22500%22><rect fill=%22%23E3FFF9%22 width=%22800%22 height=%22500%22/><text x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%23666%22 font-size=%2224%22>照片</text></svg>'">
        <p class="photo-detail-caption" id="photoCaption">在此地的回忆</p>

    <script>
        (function () {
            var id = (new URLSearchParams(location.search)).get('id');
            var caption = document.getElementById('photoCaption');
            if (id && caption) caption.textContent = '照片 #' + id + ' - 在此地的回忆';
        })();
    </script>
