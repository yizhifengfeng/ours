<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>去哪儿 - 地图</title>
    <link rel="stylesheet" href="love.css">
    <link rel="stylesheet" href="qunaer.css">
</head>
<body class="page-qunaer">
    <!-- 顶部导航：返回首页 -->
    <header class="qunaer-header">
        <a href="index.html" class="qunaer-back" aria-label="返回首页">← 首页</a>
        <h1 class="qunaer-title">去哪儿</h1>
    </header>

    <!-- 地图展示区：SVG 地标，已去过 #ED688D，鼠标靠近放大、点击进详情 -->
    <main class="qunaer-main">
        <div class="map-wrap">
            <svg class="map-svg" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" aria-label="我们去过的地点">
                <!-- 简化的地图轮廓（示意陆地/区域） -->
                <defs>
                    <linearGradient id="mapFill" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#E8F8F5" />
                        <stop offset="100%" style="stop-color:#FFE4EC" />
                    </linearGradient>
                    <filter id="markerShadow" x="-20%" y="-20%" width="140%" height="140%">
                        <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.2"/>
                    </filter>
                </defs>
                <rect width="600" height="400" fill="url(#mapFill)" rx="16"/>
                <path class="map-outline" d="M80 120 Q200 80 320 100 T500 90 L520 280 Q400 320 280 300 T80 260 Z" fill="rgba(255,255,255,0.6)" stroke="rgba(237,104,141,0.3)" stroke-width="2"/>
                <!-- 地标点：已去过 #ED688D，未去过灰色；data-id 用于跳转详情 -->
                <g class="marker marker--visited" data-id="1" data-name="大连">
                    <circle cx="120" cy="140" r="14" fill="#ED688D" filter="url(#markerShadow)"/>
                    <circle cx="120" cy="140" r="6" fill="#fff"/>
                </g>
                <g class="marker marker--visited" data-id="2" data-name="北京">
                    <circle cx="280" cy="100" r="14" fill="#ED688D" filter="url(#markerShadow)"/>
                    <circle cx="280" cy="100" r="6" fill="#fff"/>
                </g>
                <g class="marker marker--visited" data-id="3" data-name="上海">
                    <circle cx="420" cy="180" r="14" fill="#ED688D" filter="url(#markerShadow)"/>
                    <circle cx="420" cy="180" r="6" fill="#fff"/>
                </g>
                <g class="marker marker--future" data-id="4" data-name="成都">
                    <circle cx="200" cy="260" r="12" fill="#B0B0B0" filter="url(#markerShadow)"/>
                    <circle cx="200" cy="260" r="5" fill="#fff"/>
                </g>
                <g class="marker marker--future" data-id="5" data-name="杭州">
                    <circle cx="380" cy="280" r="12" fill="#B0B0B0" filter="url(#markerShadow)"/>
                    <circle cx="380" cy="280" r="5" fill="#fff"/>
                </g>
            </svg>
            <div class="map-legend">
                <span class="legend-dot legend-dot--visited"></span> 已去过
                <span class="legend-dot legend-dot--future"></span> 想去
            </div>
        </div>

        <!-- 添加新地址入口：点击弹出表单 -->
        <button type="button" class="qunaer-add-btn" id="btnAddPlace" aria-label="添加新地址">+ 添加新地址</button>
    </main>

    <!-- 弹窗：添加新地址表单 -->
    <dialog class="add-place-dialog" id="addPlaceDialog" aria-labelledby="addPlaceTitle">
        <div class="add-place-dialog-inner">
            <h2 id="addPlaceTitle" class="add-place-title">添加新地址</h2>
            <form class="add-place-form" id="addPlaceForm">
                <label class="add-place-label">地点名称 <input type="text" name="name" required placeholder="如：厦门" class="add-place-input"></label>
                <label class="add-place-label">备注 <input type="text" name="note" placeholder="选填" class="add-place-input"></label>
                <label class="add-place-label">地图上的 X 坐标（0–600）<input type="number" name="x" min="0" max="600" value="300" class="add-place-input"></label>
                <label class="add-place-label">地图上的 Y 坐标（0–400）<input type="number" name="y" min="0" max="400" value="200" class="add-place-input"></label>
                <div class="add-place-actions">
                    <button type="submit" class="add-place-submit">保存</button>
                    <button type="button" class="add-place-cancel" id="btnCancelAdd">取消</button>
                </div>
            </form>
        </div>
    </dialog>

    <script src="qunaer.js"></script>
    <script src="music-player.js"></script>
</body>
</html>
