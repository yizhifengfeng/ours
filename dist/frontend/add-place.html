<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加新地址 - 去哪儿</title>
    <link rel="stylesheet" href="love.css">
    <link rel="stylesheet" href="where.css">
</head>
<body>
    <!-- 添加地址表单页（独立页，从地图页“添加新地址”也可用弹窗） -->
    <main class="page-add-place">
        <header class="where-header">
            <a href="where.html" class="where-back" aria-label="返回地图">← 返回地图</a>
            <h1 class="where-title">添加新地址</h1>
        </header>

        <div class="modal-box">
            <form class="form-add-place" id="formAddPlacePage" action="where.html" method="get">
                <label class="form-label">地点名称 <input type="text" name="name" required placeholder="例如：厦门"></label>
                <label class="form-label">备注 <input type="text" name="note" placeholder="选填"></label>
                <label class="form-label">地图位置（模拟） <input type="text" name="position" placeholder="经度,纬度" value="120,30"></label>
                <div class="form-actions">
                    <a href="where.html" class="btn btn-cancel" style="text-align:center;text-decoration:none;line-height:2.5">取消</a>
                    <button type="submit" class="btn btn-submit">保存</button>
                </div>
            </form>
        </div>
    </main>
    <script src="music-player.js"></script>
</body>
</html>
